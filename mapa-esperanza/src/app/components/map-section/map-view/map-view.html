<div class="w-full h-full relative">
  <div id="map" class="w-full h-full"></div>

  <!-- Modal para el formulario de reporte -->
  @if (isModalVisible) {
  <div
    (click)="closeModal()"
    class="fixed inset-0 bg-transparent bg-opacity-60 backdrop-blur-sm flex items-center justify-center z-50 p-4"
  >
    <div
      (click)="$event.stopPropagation()"
      class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 max-w-lg w-full transform transition-all duration-300 scale-100 opacity-100 "
    >
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white">
          Reportar
        </h2>
        <button
          (click)="closeModal()"
          class="text-gray-400 hover:text-gray-700 dark:hover:text-white text-3xl cursor-pointer"
        >
          &times;
        </button>
      </div>
      <form (ngSubmit)="handleFormSubmit()">
        <div class="mb-4">
          <label
            for="category"
            class="block text-gray-700 dark:text-gray-300 font-medium mb-2"
            >Categoría</label
          >
          <select
            id="category"
            name="category"
            [(ngModel)]="newReportData.category"
            class="w-full px-4 py-2 bg-gray-100 dark:bg-gray-700 dark:text-white border-2 border-transparent focus:border-blue-500 rounded-lg focus:outline-none transition cursor-pointer"
            required
          >
            <option value="seguridad">Seguridad</option>
            <option value="salud">Salud</option>
            <option value="transporte">Transporte</option>
            <option value="espacio-publico">Espacio Público</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        <div class="mb-6">
          <label
            for="description"
            class="block text-gray-700 dark:text-gray-300 font-medium mb-2"
            >Describe el problema</label
          >
          <textarea
            id="description"
            name="description"
            [(ngModel)]="newReportData.description"
            rows="4"
            class="w-full px-4 py-2 bg-gray-100 dark:bg-gray-700 dark:text-white border-2 border-transparent focus:border-blue-500 rounded-lg focus:outline-none transition cursor-text"
            placeholder="Ej: Falta de iluminación en el parque del barrio..."
            required
          ></textarea>
        </div>
        <div class="flex justify-center">
          <button
            type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition duration-300 transform hover:scale-105 cursor-pointer"
          >
            Guardar
          </button>
        </div>
      </form>
    </div>
  </div>
  }

  <!-- Notificación de Éxito -->
  @if (isSuccessVisible) {
  <div
    class="fixed bottom-5 right-5 bg-green-500 text-white py-3 px-6 rounded-lg shadow-xl transition-opacity duration-300"
  >
    <p>✅ ¡Reporte guardado con éxito!</p>
  </div>
  }
</div>
