<aside class="flex flex-col w-96 h-screen bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 transition-colors duration-300">
  <!-- Header -->
  <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-blue-600 dark:text-blue-400">
        Mapa Esperanza
      </h1>
      <p class="text-sm text-gray-500 dark:text-gray-300">
        Reportes ciudadanos en Quindío
      </p>
    </div>
    
    <!-- Botón para Cambiar el Tema -->
    <div class="bg-gray-100 dark:bg-gray-700 p-1 rounded-full">
      <button (click)="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-full text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
        <!-- Íconos de Tema con el nuevo control flow @if -->
        @if (!isDarkMode) {
          <!-- Ícono de Sol (Modo Claro) -->
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        } @else {
          <!-- Ícono de Luna (Modo Oscuro) -->
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        }
      </button>
    </div>
  </div>

    <div class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-2">
    
    <!-- Usamos el pipe async para suscribirnos y mostrar los datos -->
    @for (report of reports$ | async; track report.id) {
        <div class="p-3 rounded-lg cursor-pointer bg-gray-50 dark:bg-gray-700 hover:bg-blue-100 dark:hover:bg-blue-900/50 transition-colors duration-200">
        <div class="flex items-center">
            <div class="ml-3">
            <p class="font-bold text-sm text-gray-800 dark:text-white">{{ report.category }}</p>
            <p class="text-xs text-gray-600 dark:text-gray-300">{{ report.description.substring(0, 40) }}...</p>
            </div>
        </div>
        </div>
    } @empty {
        <!-- Mensaje si no hay reportes -->
        <div class="text-center p-8 text-gray-500 dark:text-gray-400">
        <p>Aún no hay reportes.</p>
        </div>
    }

    </div>

  <!-- Footer -->
  <div class="p-4 border-t border-gray-200 dark:border-gray-700">
    <p class="text-xs text-center text-gray-400 dark:text-gray-300">
      Haz clic en el mapa para añadir un nuevo reporte.
    </p>
  </div>
</aside>
